services:
  - type: web
    name: breathe-esg-backend
    env: python
    plan: free
    rootDir: .
    buildCommand: bash backend/build.sh
    startCommand: gunicorn config.wsgi:application --chdir backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://your-frontend.vercel.app

databases:
  - name: breathe-esg-db
    plan: free
